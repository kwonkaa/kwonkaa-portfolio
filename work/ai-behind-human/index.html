<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#f5f2ec;--ink:#1b1a17;--soft:#8a8478;--line:rgba(27,26,23,.14);--serif:'Fraunces',Georgia,'Noto Serif KR',serif;--sans:'Inter',-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;}*{box-sizing:border-box;}html{scroll-behavior:smooth;}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}img{display:block;width:100%;height:100%;object-fit:cover;}.progress{position:fixed;top:0;left:0;height:2px;width:0%;background:var(--ink);z-index:50;transition:width .1s linear;}.topbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;justify-content:space-between;align-items:center;padding:1.6rem clamp(1.25rem,4vw,3rem);font-size:.78rem;letter-spacing:.06em;mix-blend-mode:difference;color:#fff;pointer-events:none;}.topbar__mark{font-family:var(--serif);font-style:italic;}.hero{position:relative;height:100vh;min-height:560px;overflow:hidden;display:flex;align-items:flex-end;}.hero__media{position:absolute;inset:0;}.hero__veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,.55) 100%);}.hero__content{position:relative;z-index:2;color:#fdfbf6;padding:0 clamp(1.25rem,4vw,3rem) clamp(2.5rem,7vw,5rem);}.hero__title{font-family:var(--serif);font-weight:300;font-size:clamp(3.2rem,11vw,8rem);margin:0 0 .4rem;letter-spacing:-.01em;}.hero__tagline{font-size:clamp(.95rem,1.3vw,1.15rem);font-weight:300;opacity:.88;margin:0;}.hero__scroll{position:absolute;right:clamp(1.25rem,4vw,3rem);bottom:clamp(1.5rem,4vw,2.5rem);z-index:2;color:#fdfbf6;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;opacity:.7;writing-mode:vertical-rl;}.reveal{opacity:0;transform:translateY(28px);transition:opacity .9s ease,transform .9s ease;}.reveal.is-visible{opacity:1;transform:translateY(0);}.intro{padding:clamp(3.5rem,9vw,6rem) clamp(1.25rem,4vw,3rem) clamp(3rem,7vw,5rem);max-width:1100px;margin:0 auto;}.intro__lede{font-family:var(--serif);font-weight:300;font-size:clamp(1.3rem,2.8vw,2rem);line-height:1.6;margin:0;max-width:50ch;}.meta{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;margin:0;padding-top:1.75rem;border-top:1px solid var(--line);max-width:480px;}.meta__item dt{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);margin:0 0 .5rem;}.meta__item dd{font-size:.95rem;margin:0;font-weight:400;}.row{display:grid;gap:2px;background:var(--paper);}.row__item{margin:0;position:relative;min-height:320px;}.video-block{background:#000;}.video-block video{width:100%;display:block;aspect-ratio:16/9;background:#000;max-height:100vh;}.audio{padding:clamp(4rem,10vw,7rem) clamp(1.25rem,4vw,3rem);max-width:720px;margin:0 auto;text-align:center;}.audio__label{font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin:0 0 2.25rem;}.player{display:flex;align-items:center;gap:1.4rem;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:1.6rem 0;}.player__toggle{flex:0 0 auto;width:48px;height:48px;border-radius:50%;border:1px solid var(--ink);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:background .25s ease,color .25s ease;}.player__toggle:hover{background:var(--ink);color:var(--paper);}.icon{width:16px;height:16px;fill:currentColor;}.player__body{flex:1 1 auto;text-align:left;}.player__title{font-family:var(--serif);font-style:italic;font-size:1.05rem;margin-bottom:.6rem;}.player__bar{position:relative;height:2px;background:var(--line);border-radius:2px;cursor:pointer;}.player__bar-fill{position:absolute;left:0;top:0;height:100%;width:0%;background:var(--ink);}.player__time{display:flex;justify-content:space-between;font-size:.72rem;letter-spacing:.04em;color:var(--soft);margin-top:.6rem;}.footer{padding:clamp(4rem,11vw,7rem) clamp(1.25rem,4vw,3rem);text-align:center;}.footer__meta{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;font-size:.75rem;letter-spacing:.05em;color:var(--soft);border-top:1px solid var(--line);padding-top:1.75rem;max-width:480px;margin:0 auto;}@media (max-width:760px){.row{grid-template-columns:1fr !important;}.row__item{height:60vh !important;}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<header class="topbar"><span class="topbar__mark">AI 뒤에 사람있어요</span><span class="topbar__meta">2026</span></header>

</dl>

<section class="video-block reveal"><video src="AI 뒤에 사람 있어요_이노션_221134_권연수.mp4" controls preload="metadata" playsinline></video></section>
<section class="audio reveal"><p class="audio__label">Music</p><div class="player"><button class="player__toggle" aria-label="재생"><svg class="icon icon--play" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"></polygon></svg><svg class="icon icon--pause" viewBox="0 0 24 24" hidden><rect x="5" y="4" width="5" height="16"></rect><rect x="14" y="4" width="5" height="16"></rect></svg></button><div class="player__body"><div class="player__title">AI 뒤에 사람있어요</div><div class="player__bar"><div class="player__bar-fill"></div></div><div class="player__time"><span class="player__current">0:00</span><span class="player__duration">0:00</span></div></div><audio src="AI뒤에사람있어요 정말최종.mp3" preload="metadata"></audio></div></section>
<footer class="footer reveal"><div class="footer__meta"><span>AI 뒤에 사람있어요 — 2026</span></div></footer>
<script>
var progress=document.getElementById('progress');function up(){var h=document.documentElement;var s=h.scrollTop/(h.scrollHeight-h.clientHeight)*100;progress.style.width=s+'%';}document.addEventListener('scroll',up,{passive:true});up();var els=document.querySelectorAll('.reveal');var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('is-visible');io.unobserve(e.target);}});},{threshold:.15});els.forEach(function(el){io.observe(el);});function fmt(s){if(!isFinite(s))return '0:00';var m=Math.floor(s/60);var sec=Math.floor(s%60).toString().padStart(2,'0');return m+':'+sec;}document.querySelectorAll('.player').forEach(function(p){var audio=p.querySelector('audio');var toggle=p.querySelector('.player__toggle');var playIcon=p.querySelector('.icon--play');var pauseIcon=p.querySelector('.icon--pause');var fill=p.querySelector('.player__bar-fill');var bar=p.querySelector('.player__bar');var cur=p.querySelector('.player__current');var dur=p.querySelector('.player__duration');toggle.addEventListener('click',function(){if(audio.paused){audio.play();playIcon.hidden=true;pauseIcon.hidden=false;}else{audio.pause();playIcon.hidden=false;pauseIcon.hidden=true;}});audio.addEventListener('loadedmetadata',function(){dur.textContent=fmt(audio.duration);});audio.addEventListener('timeupdate',function(){if(audio.duration){fill.style.width=(audio.currentTime/audio.duration*100)+'%';cur.textContent=fmt(audio.currentTime);}});audio.addEventListener('ended',function(){playIcon.hidden=false;pauseIcon.hidden=true;});bar.addEventListener('click',function(e){var r=bar.getBoundingClientRect();var ratio=(e.clientX-r.left)/r.width;if(audio.duration)audio.currentTime=ratio*audio.duration;});});
</script>
</body>
